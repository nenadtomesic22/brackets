<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Target Sombor - TV</title>
<link href="https://fonts.googleapis.com/css2?family=Stardos+Stencil:wght@400;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
  :root {
    --bg:      #09090E;
    --surface: #12131F;
    --card:    #1A1C2E;
    --border:  #3C3560;
    --accent:  #2B60E8;
    --accent2: #C4873A;
    --text:    #F0EDE6;
    --muted:   #6B7280;
    --gold:    #C4873A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse at 20% 50%,rgba(43,96,232,0.06) 0%,transparent 60%),
               radial-gradient(ellipse at 80% 20%,rgba(196,135,58,0.04) 0%,transparent 50%);}

  /* TV HEADER */
  .tv-header{display:flex;align-items:center;gap:20px;padding:14px 32px;border-bottom:1px solid var(--border);position:relative;z-index:10;}
  .logo{font-family:'Stardos Stencil',serif;font-weight:700;font-size:1.5rem;letter-spacing:0.1em;color:var(--text);flex-shrink:0;}
  .tv-tournament-name{font-family:'Stardos Stencil',serif;font-weight:700;font-size:1.1rem;letter-spacing:0.08em;color:var(--muted);}
  .tv-scene-badge{margin-left:auto;font-size:0.6rem;letter-spacing:2px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

  main{position:relative;z-index:1;}

  /* BRACKET LAYOUT */
  .bracket-scroll{overflow-x:auto;padding:24px 32px;}
  .blabel{font-family:'Stardos Stencil',serif;font-weight:700;font-size:0.9rem;letter-spacing:0.15em;color:var(--accent);margin-bottom:16px;text-transform:uppercase;}
  .blabel.lb{color:var(--accent2);}
  .blabel.gfl{color:var(--gold);}
  .rounds{display:flex;align-items:flex-start;min-width:max-content;gap:100px;}
  .round-col{display:flex;flex-direction:column;justify-content:space-around;}
  .round-col .match-card{margin-top:0;margin-bottom:0;}
  .round-title{font-size:0.6rem;letter-spacing:0.2em;color:var(--muted);text-align:center;padding:0 8px 10px;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
  .match-card{width:200px;border:1px solid var(--border);background:var(--card);position:relative;margin:4px 0;flex-shrink:0;cursor:default;}
  .match-card.gfc{border-color:rgba(196,135,58,0.5);}
  .mp{display:flex;align-items:center;padding:7px 10px;font-size:0.78rem;border-bottom:1px solid var(--border);min-height:32px;}
  .mp:last-child{border-bottom:none;}
  .mp.win{background:rgba(43,96,232,0.1);color:var(--accent);}
  .mp.lose{color:var(--muted);text-decoration:line-through;}
  .mp.tbd{color:var(--muted);font-style:italic;}
  .mp-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
  .mp-score{font-family:'Stardos Stencil',serif;font-weight:700;font-size:1.1rem;min-width:22px;text-align:right;color:var(--muted);}
  .mp.win .mp-score{color:var(--accent);}
  .mid{position:absolute;top:-7px;left:7px;font-size:0.55rem;color:var(--muted);background:var(--card);padding:0 3px;letter-spacing:1px;font-family:'DM Sans',sans-serif;}
  .gf-section{padding:24px 32px 32px;}
  .gf-note{font-size:0.7rem;color:var(--muted);margin-top:10px;line-height:1.8;}
  .champ-box{margin-top:20px;padding:20px 30px;border:1px solid var(--gold);background:rgba(196,135,58,0.06);display:inline-block;}
  .champ-lbl{font-family:'Stardos Stencil',serif;font-weight:700;font-size:0.75rem;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
  .champ-name{font-family:'Stardos Stencil',serif;font-weight:700;font-size:2.2rem;letter-spacing:0.08em;}

  /* SCHEDULE SCENE */
  .sched-wrap{display:flex;gap:32px;justify-content:center;align-items:flex-start;padding:32px;height:calc(100vh - 60px);box-sizing:border-box;}
  .sched-box{flex:1;max-width:520px;border:1px solid var(--border);background:var(--card);padding:24px 28px;}
  .sched-box-title{font-family:'Stardos Stencil',serif;font-weight:700;font-size:0.85rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .sched-match{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(60,53,96,0.4);}
  .sched-match:last-child{border-bottom:none;}
  .sched-match-id{font-size:0.55rem;color:var(--muted);min-width:60px;font-family:'DM Mono',monospace;}
  .sched-match-p{flex:1;font-family:'Stardos Stencil',serif;font-weight:700;font-size:1rem;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sched-match-vs{font-size:0.65rem;color:var(--muted);padding:0 4px;flex-shrink:0;}
  .sched-empty{color:var(--muted);font-style:italic;font-size:0.8rem;padding:8px 0;}

  /* WAITING SCREEN */
  .waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;position:relative;z-index:1;}
  .waiting-icon{font-size:3rem;}
  .waiting-title{font-family:'Stardos Stencil',serif;font-weight:700;font-size:1.8rem;letter-spacing:0.12em;color:var(--muted);}
  .waiting-sub{font-size:0.7rem;color:var(--muted);letter-spacing:0.2em;font-family:'DM Sans',sans-serif;}
</style>
</head>
<body>

<div class="tv-header">
  <div class="logo">TARGET</div>
  <div class="tv-tournament-name" id="tvTournamentName"></div>
  <div class="tv-scene-badge">
    <span class="live-dot" id="liveDot" style="background:var(--muted);box-shadow:none"></span>
    <span id="tvSceneName">—</span>
  </div>
</div>

<main>
  <!-- WAITING — kad nema aktivnog turnira -->
  <div class="waiting" id="waitingScreen">
    <div class="waiting-icon">🎯</div>
    <div class="waiting-title">ČEKANJE</div>
    <div class="waiting-sub">Izaberi turnir u Scene Controlleru</div>
  </div>

  <!-- SCENE: WINNERS 1 -->
  <div id="sceneWinners1" style="display:none">
    <div class="bracket-scroll"><div class="blabel">ŽREB 1</div><div class="rounds" id="wRoundsTop"></div></div>
  </div>

  <!-- SCENE: WINNERS 2 -->
  <div id="sceneWinners2" style="display:none">
    <div class="bracket-scroll"><div class="blabel">ŽREB 2</div><div class="rounds" id="wRoundsBottom"></div></div>
  </div>

  <!-- SCENE: LOSERS -->
  <div id="sceneLosers" style="display:none">
    <div class="bracket-scroll"><div class="blabel lb">REPASAŽ</div><div class="rounds" id="lRounds"></div></div>
  </div>

  <!-- SCENE: SCHEDULE -->
  <div id="sceneSchedule" style="display:none">
    <div class="sched-wrap" id="scheduleArea"></div>
  </div>

  <!-- SCENE: FINALE -->
  <div id="sceneFinale" style="display:none">
    <div class="gf-section"><div class="blabel gfl">🏆 FINALE</div><div id="gfArea"></div></div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://mvsozhihhrlwdsvfynxw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12c296aGloaHJsd2RzdmZ5bnh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzA5MzAsImV4cCI6MjA5MDcwNjkzMH0.F2Y9EiCQHZiIdc-cDTICZI-efFnwlmmEFVc_H5NqT04';
if (!window._sb) window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const sb = window._sb;

const BYE = "__BYE__";
let db = [];
let activeTid = null;
let activeScene = 'winners-1';

const ALL_SCENE_IDS = ['sceneWinners1','sceneWinners2','sceneLosers','sceneSchedule','sceneFinale'];
const SCENE_MAP = {
  'winners-1':     { el:'sceneWinners1',  name:'ŽREB 1' },
  'winners-2':     { el:'sceneWinners2',  name:'ŽREB 2' },
  'losers':        { el:'sceneLosers',    name:'REPASAŽ' },
  'schedule':      { el:'sceneSchedule',  name:'RASPORED' },
  'finale':        { el:'sceneFinale',    name:'FINALE' },
  'winners':       { el:'sceneWinners1',  name:'ŽREB 1' },
  'winners-early': { el:'sceneWinners1',  name:'ŽREB 1' },
  'winners-late':  { el:'sceneWinners2',  name:'ŽREB 2' },
  'losers-early':  { el:'sceneLosers',    name:'REPASAŽ' },
  'losers-late':   { el:'sceneLosers',    name:'REPASAŽ' },
};

// ─── INIT ────────────────────────────────────────────────────
async function init() {
  const { data } = await sb.from('tournaments').select('*');
  db = data || [];
  db.forEach(t => { t._routes = buildRoutingTable(nextPow2(t.seed.length)); });

  subscribeRealtime();
  await loadSceneState();
  subscribeScene();
}

// ─── SCENE STATE ─────────────────────────────────────────────
async function loadSceneState() {
  const { data } = await sb.from('scene_state').select('*').eq('id',1).single();
  if (data) applySceneState(data);
}

function subscribeScene() {
  sb.channel('scene_tv')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'scene_state' },
      p => applySceneState(p.new))
    .subscribe();
}

function applySceneState(state) {
  if (!state?.tournament_id) { showWaiting(); return; }
  const t = db.find(t => t.id === state.tournament_id);
  if (!t) { showWaiting(); return; }

  // Load tournament if changed
  if (activeTid !== state.tournament_id) {
    activeTid = state.tournament_id;
    replayAll(t);
    renderAllBrackets(t);
  }

  activeScene = state.scene;
  showScene(state.scene, t);
}

function showWaiting() {
  activeTid = null;
  document.getElementById('waitingScreen').style.display = '';
  ALL_SCENE_IDS.forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('tvTournamentName').textContent = '';
  document.getElementById('tvSceneName').textContent = '—';
  const dot = document.getElementById('liveDot');
  dot.style.background = 'var(--muted)'; dot.style.boxShadow = 'none';
}

function showScene(scene, t) {
  document.getElementById('waitingScreen').style.display = 'none';
  ALL_SCENE_IDS.forEach(id => document.getElementById(id).style.display = 'none');
  const is32 = nextPow2(t.seed.length) === 32;
  const resolved = (!is32 && scene === 'winners-2') ? 'winners-1' : scene;
  const info = SCENE_MAP[resolved] || SCENE_MAP['winners-1'];
  document.getElementById(info.el).style.display = '';
  document.getElementById('tvTournamentName').textContent = t.name;
  document.getElementById('tvSceneName').textContent = info.name;
  const dot = document.getElementById('liveDot');
  dot.style.background = 'var(--accent)'; dot.style.boxShadow = '0 0 6px var(--accent)';
  requestAnimationFrame(() => fitSceneHeight(info.el));
}

function fitSceneHeight(sceneId) {
  const sceneEl = document.getElementById(sceneId);
  const scroll = sceneEl?.querySelector('.bracket-scroll');
  if (!scroll) return;
  scroll.style.zoom = '';
  const headerH = document.querySelector('.tv-header').offsetHeight;
  const available = window.innerHeight - headerH - 48;
  const contentH = scroll.scrollHeight;
  if (contentH > available && available > 0) {
    scroll.style.zoom = available / contentH;
  }
}

// ─── REALTIME TOURNAMENT UPDATES ────────────────────────────
function subscribeRealtime() {
  sb.channel('tournaments_tv')
    .on('postgres_changes', { event:'*', schema:'public', table:'tournaments' }, payload => {
      const updated = payload.new;
      const idx = db.findIndex(t => t.id === updated.id);
      if (idx !== -1) db[idx] = updated; else db.push(updated);
      if (activeTid === updated.id) {
        const t = db.find(t => t.id === activeTid);
        t._routes = buildRoutingTable(nextPow2(t.seed.length));
        replayAll(t);
        renderAllBrackets(t);
        showScene(activeScene, t);
      }
    })
    .subscribe();
}

// ─── BRACKET LOGIC (read-only, no score input) ───────────────
function mkM(id, p1=null, p2=null) {
  return { id, p1, p2, s1:null, s2:null, winner:null, loser:null, done:false, nextWin:null, nextLose:null };
}

function buildRoutingTable(size) {
  const routes = {};
  if (size === 4) {
    routes['W_R1_M0'] = { win:{b:'W',r:1,m:0,s:1}, lose:{b:'L',r:0,m:0,s:1} };
    routes['W_R1_M1'] = { win:{b:'W',r:1,m:0,s:2}, lose:{b:'L',r:0,m:0,s:2} };
    routes['W_R2_M0'] = { win:{b:'GF',s:1}, lose:{b:'L',r:1,m:0,s:2} };
    routes['L_R1_M0'] = { win:{b:'L',r:1,m:0,s:1}, lose:null };
    routes['L_R2_M0'] = { win:{b:'GF',s:2}, lose:null };
    routes['GF']  = { win:{b:'GFR',s:1}, lose:{b:'GFR',s:2} };
    routes['GFR'] = { win:null, lose:null };
  }
  else if (size === 8) {
    routes['W_R1_M0'] = { win:{b:'W',r:1,m:0,s:1}, lose:{b:'L',r:0,m:0,s:1} };
    routes['W_R1_M1'] = { win:{b:'W',r:1,m:0,s:2}, lose:{b:'L',r:0,m:0,s:2} };
    routes['W_R1_M2'] = { win:{b:'W',r:1,m:1,s:1}, lose:{b:'L',r:0,m:1,s:1} };
    routes['W_R1_M3'] = { win:{b:'W',r:1,m:1,s:2}, lose:{b:'L',r:0,m:1,s:2} };
    routes['W_R2_M0'] = { win:{b:'W',r:2,m:0,s:1}, lose:{b:'L',r:1,m:0,s:2} };
    routes['W_R2_M1'] = { win:{b:'W',r:2,m:0,s:2}, lose:{b:'L',r:1,m:1,s:2} };
    routes['W_R3_M0'] = { win:{b:'GF',s:1}, lose:{b:'L',r:3,m:0,s:2} };
    routes['L_R1_M0'] = { win:{b:'L',r:1,m:0,s:1}, lose:null };
    routes['L_R1_M1'] = { win:{b:'L',r:1,m:1,s:1}, lose:null };
    routes['L_R2_M0'] = { win:{b:'L',r:2,m:0,s:1}, lose:null };
    routes['L_R2_M1'] = { win:{b:'L',r:2,m:0,s:2}, lose:null };
    routes['L_R3_M0'] = { win:{b:'L',r:3,m:0,s:1}, lose:null };
    routes['L_R4_M0'] = { win:{b:'GF',s:2}, lose:null };
    routes['GF']  = { win:{b:'GFR',s:1}, lose:{b:'GFR',s:2} };
    routes['GFR'] = { win:null, lose:null };
  }
  else if (size === 16) {
    for (let i=0;i<8;i++) routes[`W_R1_M${i}`]={win:{b:'W',r:1,m:Math.floor(i/2),s:(i%2===0?1:2)},lose:{b:'L',r:0,m:Math.floor(i/2),s:(i%2===0?1:2)}};
    for (let i=0;i<4;i++) routes[`W_R2_M${i}`]={win:{b:'W',r:2,m:Math.floor(i/2),s:(i%2===0?1:2)},lose:{b:'L',r:1,m:i,s:2}};
    for (let i=0;i<2;i++) routes[`W_R3_M${i}`]={win:{b:'W',r:3,m:Math.floor(i/2),s:(i%2===0?1:2)},lose:{b:'L',r:3,m:i,s:2}};
    routes['W_R4_M0']={win:{b:'GF',s:1},lose:{b:'L',r:5,m:0,s:2}};
    for (let i=0;i<4;i++) routes[`L_R1_M${i}`]={win:{b:'L',r:1,m:i,s:1},lose:null};
    for (let i=0;i<4;i++) routes[`L_R2_M${i}`]={win:{b:'L',r:2,m:Math.floor(i/2),s:(i%2===0?1:2)},lose:null};
    for (let i=0;i<2;i++) routes[`L_R3_M${i}`]={win:{b:'L',r:3,m:i,s:1},lose:null};
    for (let i=0;i<2;i++) routes[`L_R4_M${i}`]={win:{b:'L',r:4,m:Math.floor(i/2),s:(i%2===0?1:2)},lose:null};
    routes['L_R4_M0']={win:{b:'L',r:4,m:0,s:1},lose:null};
    routes['L_R5_M0']={win:{b:'L',r:5,m:0,s:1},lose:null};
    routes['L_R6_M0']={win:{b:'GF',s:2},lose:null};
    routes['GF']={win:{b:'GFR',s:1},lose:{b:'GFR',s:2}};
    routes['GFR']={win:null,lose:null};
  }
  else if (size === 32) {
    for (let i=0;i<16;i++) routes[`W_R1_M${i}`]={win:{b:'W',r:1,m:Math.floor(i/2),s:(i%2===0?1:2)},lose:{b:'L',r:0,m:Math.floor(i/2),s:(i%2===0?1:2)}};
    for (let i=0;i<8;i++) routes[`W_R2_M${i}`]={win:{b:'W',r:2,m:Math.floor(i/2),s:(i%2===0?1:2)},lose:{b:'L',r:1,m:i,s:2}};
    for (let i=0;i<4;i++) routes[`W_R3_M${i}`]={win:{b:'W',r:3,m:Math.floor(i/2),s:(i%2===0?1:2)},lose:{b:'L',r:3,m:i,s:2}};
    for (let i=0;i<2;i++) routes[`W_R4_M${i}`]={win:{b:'W',r:4,m:0,s:(i===0?1:2)},lose:{b:'L',r:5,m:i,s:2}};
    routes['W_R5_M0']={win:{b:'GF',s:1},lose:{b:'L',r:7,m:0,s:2}};
    for (let i=0;i<8;i++) routes[`L_R1_M${i}`]={win:{b:'L',r:1,m:i,s:1},lose:null};
    for (let i=0;i<8;i++) routes[`L_R2_M${i}`]={win:{b:'L',r:2,m:Math.floor(i/2),s:(i%2===0?1:2)},lose:null};
    for (let i=0;i<4;i++) routes[`L_R3_M${i}`]={win:{b:'L',r:3,m:i,s:1},lose:null};
    for (let i=0;i<4;i++) routes[`L_R4_M${i}`]={win:{b:'L',r:4,m:Math.floor(i/2),s:(i%2===0?1:2)},lose:null};
    for (let i=0;i<2;i++) routes[`L_R5_M${i}`]={win:{b:'L',r:5,m:i,s:1},lose:null};
    for (let i=0;i<2;i++) routes[`L_R6_M${i}`]={win:{b:'L',r:6,m:0,s:(i===0?1:2)},lose:null};
    routes['L_R7_M0']={win:{b:'L',r:7,m:0,s:1},lose:null};
    routes['L_R8_M0']={win:{b:'GF',s:2},lose:null};
    routes['GF']={win:{b:'GFR',s:1},lose:{b:'GFR',s:2}};
    routes['GFR']={win:null,lose:null};
  }
  return routes;
}

function genBracket(t) {
  const players=[...t.seed], size=nextPow2(players.length);
  const routes=buildRoutingTable(size); t._routes=routes; t._size=size;
  t.wB=[]; let r0=[];
  for (let i=0;i<size;i+=2){const id=`W_R1_M${i/2}`;const m=mkM(id,players[i],players[i+1]);applyRoutes(m,routes);r0.push(m);}
  t.wB.push(r0);
  let cur=r0.length,wr=2;
  while(cur>1){cur=Math.ceil(cur/2);const round=[];for(let i=0;i<cur;i++){const id=`W_R${wr}_M${i}`;const m=mkM(id);applyRoutes(m,routes);round.push(m);}t.wB.push(round);wr++;}
  t.lB=buildLStructure(size,routes);
  t.gf=mkM('GF');applyRoutes(t.gf,routes);
  t.gfr=mkM('GFR');applyRoutes(t.gfr,routes);
}
function applyRoutes(m,routes){const r=routes[m.id];if(!r)return;m.nextWin=r.win||null;m.nextLose=r.lose||null;}
function buildLStructure(size,routes){const lRounds=[];let r=0;while(true){const ids=Object.keys(routes).filter(k=>k.startsWith(`L_R${r+1}_`));if(!ids.length)break;const round=ids.sort((a,b)=>parseInt(a.split('_M')[1])-parseInt(b.split('_M')[1])).map(id=>{const m=mkM(id);applyRoutes(m,routes);return m;});lRounds.push(round);r++;}return lRounds;}

function replayAll(t) {
  const results=collectResults(t);
  genBracket(t);
  for (const res of results) {
    const m=findM(t,res.id); if(!m)continue;
    m.s1=res.s1;m.s2=res.s2;
    if(m.p1===BYE||m.p2===BYE){m.winner=m.p1===BYE?m.p2:m.p1;m.loser=BYE;m.done=true;}
    else{m.done=true;m.winner=res.s1>res.s2?(m.p1||res.p1):(m.p2||res.p2);m.loser=res.s1>res.s2?(m.p2||res.p2):(m.p1||res.p1);if(!m.winner)m.winner=res.winner;if(!m.loser)m.loser=res.loser;}
    propagate(t,m);
  }
  resolveByesReplay(t);
}
function collectResults(t){return allMatches(t).filter(m=>m.done&&(m.winner||m.p1===BYE||m.p2===BYE)).map(m=>({id:m.id,s1:m.s1,s2:m.s2,winner:m.winner,loser:m.loser,p1:m.p1,p2:m.p2}));}
function resolveByesReplay(t){let changed=true;while(changed){changed=false;for(const m of allMatches(t)){if(m.done)continue;if(m.p1===BYE&&m.p2===BYE){m.done=true;continue;}if(m.p1===BYE||m.p2===BYE){m.winner=m.p1===BYE?m.p2:m.p1;m.loser=null;m.done=true;propagate(t,m);changed=true;}}}}
function propagate(t,m){if(m.winner)placeInSlot(t,m.nextWin,m.winner);if(m.loser)placeInSlot(t,m.nextLose,m.loser);}
function placeInSlot(t,ref,player){if(!ref||!player)return;const m=getMatchByRef(t,ref);if(!m)return;if(ref.s===1)m.p1=player;else m.p2=player;}
function getMatchByRef(t,ref){if(!ref)return null;if(ref.b==='GF')return t.gf;if(ref.b==='GFR')return t.gfr;if(ref.b==='W')return t.wB[ref.r]?.[ref.m]||null;if(ref.b==='L')return t.lB[ref.r]?.[ref.m]||null;return null;}
function allMatches(t){return[...(t.wB||[]).flat(),...(t.lB||[]).flat(),t.gf,t.gfr].filter(Boolean);}
function findM(t,id){if(!id)return null;if(id==='GF')return t.gf;if(id==='GFR')return t.gfr;for(const r of t.wB)for(const m of r)if(m.id===id)return m;for(const r of t.lB)for(const m of r)if(m.id===id)return m;return null;}
function nextPow2(n){let x=1;while(x<n)x*=2;return x;}
function getChamp(t){if(!t.gf||!t.gf.done)return null;if(t.gf.winner===t.gf.p1)return t.gf.winner;if(t.gfr&&t.gfr.done)return t.gfr.winner;return null;}

// ─── RENDER (no onclick, pure display) ───────────────────────
const WNAMES=['1. KOLO','2. KOLO','ČETVRTFINALE','POLUFINALE','FINALE W','W FINALE'];

function setRoundsLayout(cont, size) {
  if (size >= 16) {
    cont.style.gap='0';
    cont.style.justifyContent='space-between';
    cont.style.width='100%';
    cont.style.minWidth='0';
  } else {
    cont.style.gap='100px';
    cont.style.justifyContent='';
    cont.style.width='';
    cont.style.minWidth='';
  }
}

function renderWHalf(containerId, t, isBottom) {
  const size=nextPow2(t.seed.length);
  const cont=document.getElementById(containerId);cont.innerHTML='';
  const matchH=62,gap=33,unit=matchH+gap;
  const wRounds=t.wB.slice(0,-1);
  wRounds.forEach((round,ri)=>{
    const matches=isBottom
      ?round.slice(Math.floor(round.length/2))
      :round.slice(0,Math.ceil(round.length/2));
    if(!matches.length)return;
    const rd=document.createElement('div');rd.className='round-col';
    rd.innerHTML=`<div class="round-title">${WNAMES[ri]||'KOLO '+(ri+1)}</div>`;
    let spacing=unit;
    for(let i=1;i<ri;i++) spacing=spacing*2+unit;
    const topPad=ri===0?0:spacing/2;
    matches.forEach((m,mi)=>{
      const el=mEl(m);
      if(ri===0){el.style.marginBottom=`${gap}px`;}
      else{el.style.marginBottom=`${gap}px`;el.style.marginTop=mi===0?`${topPad}px`:`${spacing}px`;}
      rd.appendChild(el);
    });
    cont.appendChild(rd);
  });
  setRoundsLayout(cont,size);
}

function renderW(t) {
  const size=nextPow2(t.seed.length);
  if (size===32) {
    renderWHalf('wRoundsTop',t,false);
    renderWHalf('wRoundsBottom',t,true);
  } else {
    const cont=document.getElementById('wRoundsTop');cont.innerHTML='';
    document.getElementById('wRoundsBottom').innerHTML='';
    const matchH=62,gap=33,unit=matchH+gap;
    const wRounds=t.wB.slice(0,-1);
    wRounds.forEach((round,ri)=>{
      const rd=document.createElement('div');rd.className='round-col';
      rd.innerHTML=`<div class="round-title">${WNAMES[ri]||'KOLO '+(ri+1)}</div>`;
      let spacing=unit;
      for(let i=1;i<ri;i++) spacing=spacing*2+unit;
      const topPad=ri===0?0:spacing/2;
      round.forEach((m,mi)=>{
        const el=mEl(m);
        if(ri===0){el.style.marginBottom=`${gap}px`;}
        else{el.style.marginBottom=`${gap}px`;el.style.marginTop=mi===0?`${topPad}px`:`${spacing}px`;}
        rd.appendChild(el);
      });
      cont.appendChild(rd);
    });
    setRoundsLayout(cont,size);
  }
}

function renderL(t) {
  const size=nextPow2(t.seed.length);
  const cont=document.getElementById('lRounds');cont.innerHTML='';
  const matchH=62,gap=33,unit=matchH+gap;
  const lRounds=t.lB.slice(0,-1);
  lRounds.forEach((round,ri)=>{
    const rd=document.createElement('div');rd.className='round-col';
    rd.innerHTML=`<div class="round-title" style="color:var(--accent2)">L-${ri+1}</div>`;
    const reducesDone=Math.floor(ri/2);
    let spacing=unit;
    for(let i=1;i<reducesDone;i++) spacing=spacing*2+unit;
    if(reducesDone===0)spacing=unit;
    const topPad=reducesDone===0?0:spacing/2;
    round.forEach((m,mi)=>{
      const el=mEl(m);
      el.style.marginBottom=`${gap}px`;
      if(ri>0&&reducesDone>0) el.style.marginTop=mi===0?`${topPad}px`:`${spacing}px`;
      rd.appendChild(el);
    });
    cont.appendChild(rd);
  });
  setRoundsLayout(cont,size);
}

function renderAllBrackets(t) {
  renderW(t);
  renderL(t);
  renderGF(t);
  renderSchedule(t);
}

function getReadyMatches(t) {
  const ready=[];
  for (const r of (t.wB||[])) for (const m of r)
    if (!m.done&&m.p1&&m.p2&&m.p1!==BYE&&m.p2!==BYE) ready.push(m);
  for (const r of (t.lB||[])) for (const m of r)
    if (!m.done&&m.p1&&m.p2&&m.p1!==BYE&&m.p2!==BYE) ready.push(m);
  if (t.gf&&!t.gf.done&&t.gf.p1&&t.gf.p2) ready.push(t.gf);
  if (t.gfr&&!t.gfr.done&&t.gfr.p1&&t.gfr.p2) ready.push(t.gfr);
  return ready;
}

function getScheduleQueue(t) {
  const numBoards=t.num_boards||2;
  const allReady=getReadyMatches(t);
  const postponedIds=(t.postponed||[]).filter(id=>allReady.some(m=>m.id===id));
  const postponedMatches=postponedIds.map(id=>allReady.find(m=>m.id===id)).filter(Boolean);
  const normal=allReady.filter(m=>!postponedIds.includes(m.id));
  const playing=normal.slice(0,numBoards);
  const next=[...postponedMatches,...normal.slice(numBoards)].slice(0,numBoards);
  return {playing,next};
}

function renderSchedule(t) {
  const area=document.getElementById('scheduleArea');
  area.innerHTML='';
  const {playing,next}=getScheduleQueue(t);

  function box(title,color,matches){
    const d=document.createElement('div');d.className='sched-box';
    const h=document.createElement('div');h.className='sched-box-title';
    h.style.color=color;h.textContent=title;d.appendChild(h);
    if(!matches.length){
      const e=document.createElement('div');e.className='sched-empty';e.textContent='—';d.appendChild(e);
    } else {
      matches.forEach(m=>{
        const r=document.createElement('div');r.className='sched-match';
        r.innerHTML=`<span class="sched-match-id">${m.id}</span><span class="sched-match-p">${m.p1}</span><span class="sched-match-vs">VS</span><span class="sched-match-p">${m.p2}</span>`;
        d.appendChild(r);
      });
    }
    return d;
  }

  area.appendChild(box('TRENUTNO SE IGRA','var(--accent)',playing));
  area.appendChild(box('SLEDEĆI NA REDU','var(--muted)',next));
}

function renderGF(t) {
  const area=document.getElementById('gfArea');area.innerHTML='';

  function lbl(text,color){
    const d=document.createElement('div');
    d.style.cssText=`font-family:'Stardos Stencil',serif;font-weight:700;font-size:0.75rem;letter-spacing:3px;color:${color};margin:0 0 6px`;
    d.textContent=text;return d;
  }
  function spacer(h=16){const d=document.createElement('div');d.style.height=h+'px';return d;}
  function hr(){const d=document.createElement('div');d.style.cssText='height:1px;background:var(--border);margin:18px 0';return d;}

  const wFinal=t.wB[t.wB.length-1]?.[0];
  if(wFinal){area.appendChild(lbl('FINALE W','var(--accent)'));area.appendChild(mEl(wFinal));area.appendChild(spacer());}

  const lFinal=t.lB[t.lB.length-1]?.[0];
  if(lFinal){area.appendChild(lbl('FINALE L','var(--accent2)'));area.appendChild(mEl(lFinal));}

  area.appendChild(hr());

  area.appendChild(lbl('GRAND FINAL','var(--gold)'));
  area.appendChild(mEl(t.gf,true));
  if(t.gf.done){
    if(t.gf.winner===t.gf.p1){area.appendChild(champEl(t.gf.winner));}
    else{
      const note=document.createElement('div');note.className='gf-note';
      note.innerHTML='⚡ <strong style="color:var(--accent2)">EGAL</strong> — Repasaž finalista mora pobediti dva puta.';
      area.appendChild(note);
      area.appendChild(spacer(10));
      area.appendChild(lbl('ODLUČUJUĆI SET','var(--accent2)'));
      area.appendChild(mEl(t.gfr,true));
      if(t.gfr.done)area.appendChild(champEl(t.gfr.winner));
    }
  }
}

function mEl(m,isGF=false){
  const d=document.createElement('div');
  d.className='match-card'+(isGF?' gfc':'');
  // No onclick — TV is passive
  d.innerHTML=`<div class="mid">${m.id}</div>${pRow(m,1)}${pRow(m,2)}`;
  return d;
}
function pRow(m,n){
  const raw=m[`p${n}`];const name=raw===BYE?"BYE":raw;const score=m[`s${n}`];
  const isW=m.done&&m.winner===name;const isL=m.done&&m.loser===name;
  const cls=!name?'tbd':isW?'win':isL?'lose':'';
  return `<div class="mp ${cls}"><span class="mp-name">${name||'TBD'}</span><span class="mp-score">${m.done&&score!==null?score:''}</span></div>`;
}
function gapEl(){const d=document.createElement('div');d.style.cssText='width:16px;flex-shrink:0';return d;}
function champEl(name){const d=document.createElement('div');d.className='champ-box';d.innerHTML=`<div class="champ-lbl">🏆 POBEDNIK TURNIRA</div><div class="champ-name">${name}</div>`;return d;}

init();
</script>
